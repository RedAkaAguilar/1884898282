<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Coming Soon</title>

<meta name="theme-color" content="#553445">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#553445;
    --secondary:#845353;
    --glass:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08);
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-user-drag:none;
    user-select:none;
    -webkit-user-select:none;
    pointer-events:none;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    background:
    radial-gradient(circle at top left, rgba(132,83,83,.25), transparent 35%),
    radial-gradient(circle at bottom right, rgba(85,52,69,.35), transparent 40%),
    linear-gradient(135deg,#20151d,#2d1d26,#3b2631);
    overflow:hidden;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    -webkit-touch-callout:none;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size:40px 40px;
    animation:gridMove 30s linear infinite;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;

    background:
    linear-gradient(
        to bottom,
        rgba(0,0,0,.35),
        transparent 20%,
        transparent 80%,
        rgba(0,0,0,.35)
    );

    z-index:1;
}

@keyframes gridMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(40px);
    }
}

.floating-cube{
    position:absolute;
    width:180px;
    height:180px;
    border:1px solid rgba(255,255,255,.05);
    background:rgba(255,255,255,.02);
    backdrop-filter:blur(10px);
    transform:rotate(45deg);
    animation:float 8s ease-in-out infinite;
}

.cube1{
    top:10%;
    left:10%;
}

.cube2{
    bottom:15%;
    right:10%;
    animation-delay:2s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0) rotate(45deg);
    }
    50%{
        transform:translateY(-30px) rotate(45deg);
    }
}

.container{
    position:relative;
    z-index:10;
    width:min(900px,90%);
    text-align:center;
}

.logo{
    width:clamp(120px, 20vw, 220px);
    height:auto;
    object-fit:contain;
    display:block;
    margin:auto;
    animation:logoFloat 5s ease-in-out infinite;
    filter:drop-shadow(0 10px 25px rgba(0,0,0,.3));
}

@keyframes logoFloat{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

.title{
    margin-top:35px;
    font-size:clamp(3rem, 8vw, 7rem);
    font-weight:800;
    line-height:1;
    background:linear-gradient(
        90deg,
        #ffffff,
        #d9b4b4,
        #845353,
        #ffffff
    );
    background-size:300% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
    to{
        background-position:300% center;
    }
}

.subtitle{
    margin-top:18px;
    color:rgba(255,255,255,.7);
    width:min(90%, 650px);
    font-size:clamp(.9rem, 2vw, 1.1rem);
    margin-left:auto;
    margin-right:auto;
    line-height:1.7;
}

.glow-line{
    width:250px;
    height:4px;
    margin:35px auto;
    border-radius:999px;
    background:linear-gradient(
    90deg,
    transparent,
    var(--secondary),
    transparent
    );
}

.footer{
    margin-top:50px;
    background:var(--glass);
    backdrop-filter:blur(25px);
    border:1px solid var(--border);
    border-radius:30px;
    padding:18px;
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.social{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 18px;
    border-radius:18px;
    text-decoration:none;
    color:white;
    transition:.35s;
}

.social:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,.05);
}

.social img{
    width:34px;
    height:34px;
    border-radius:10px;
    object-fit:cover;
    -webkit-user-drag:none;
    user-select:none;
    -webkit-user-select:none;
    pointer-events:none;
}

.social span{
    font-weight:600;
}

.fade{
    opacity:0;
    transform:translateY(30px);
    animation:fadeUp 1.2s forwards;
}

.delay1{
    animation-delay:.2s;
}

.delay2{
    animation-delay:.5s;
}

.delay3{
    animation-delay:.8s;
}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

#intro{
    position:fixed;
    inset:0;
    background:#120d11;
    z-index:9999;
    animation:introFade 2.4s ease forwards;
}

.intro-glow{
    position:absolute;
    inset:0;
    background:
    radial-gradient(
        circle,
        rgba(132,83,83,.6),
        transparent 60%
    );
    animation:introZoom 2.4s ease forwards;
}

@keyframes introFade{
    0%,70%{
        opacity:1;
    }

    100%{
        opacity:0;
        visibility:hidden;
    }
}

@keyframes introZoom{
    from{
        transform:scale(.6);
        filter:blur(30px);
    }

    to{
        transform:scale(2);
        filter:blur(120px);
    }
}

  #particles{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
    }

 @media (max-width: 768px){

    .container{
        width:95%;
    }

    .footer{
        gap:12px;
        padding:14px;
    }

    .social{
        width:100%;
        justify-content:center;
    }

 }
</style>
</head>
<body>
<div id="intro">
    <div class="intro-glow"></div>
</div>

<div class="floating-cube cube1"></div>
<div class="floating-cube cube2"></div>

<canvas id="particles"></canvas>
    
<div class="container">
    <img
    src="/img/zyrakatv_icon.png"
    alt="Logo"
    class="logo fade">

    <h1 class="title fade delay1">
        COMING SOON
    </h1>

    <p class="subtitle fade delay2">
        Esta pagina aún se encuentra en progreso!
        Mantente al tanto de las noticias aqui abajo.
    </p>

    <div class="glow-line fade delay2"></div>

    <footer class="footer fade delay3">

        <a href="#" class="social">
            <img src="/img/discord_icon.png">
            <span>Discord</span>
        </a>

        <a href="#" class="social">
            <img src="/img/youtube_icon.png">
            <span>YouTube</span>
        </a>

        <a href="#" class="social">
            <img src="/img/domain_icon.png">
            <span>X</span>
        </a>

        <a href="#" class="social">
            <img src="/img/instagram_icon.png">
            <span>Instagram</span>
        </a>

    </footer>

</div>

<script>
document.addEventListener("mousemove", (e)=>{

    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 20;

    document.querySelector(".container").style.transform =
        `translate(${x * 0.15}px, ${y * 0.15}px)`;

});

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const particles = [];

for(let i=0;i<70;i++){

    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*3+1,
        speed:Math.random()*0.4+0.1,
        alpha:Math.random()*0.5+0.2
    });

}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        p.y -= p.speed;

        if(p.y < -10){
            p.y = canvas.height + 10;
            p.x = Math.random()*canvas.width;
        }

        ctx.beginPath();

        ctx.fillStyle =
        `rgba(255,255,255,${p.alpha})`;

        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );

        ctx.fill();

    });

    requestAnimationFrame(animate);

}

document.addEventListener("contextmenu", e => {
    e.preventDefault();
});

document.addEventListener("dragstart", e => {
    e.preventDefault();
});

document.addEventListener("selectstart", e => {
    e.preventDefault();
});

animate();
</script>

</body>
</html>
