<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#553445">
<title>404 - Page Not Found</title>

<style>
:root{
--primary:#553445;
--secondary:#845353;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,Arial,sans-serif;
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:
radial-gradient(circle at top left, rgba(132,83,83,.25), transparent 35%),
radial-gradient(circle at bottom right, rgba(85,52,69,.35), transparent 40%),
linear-gradient(135deg,#20151d,#2d1d26,#3b2631);
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
background-size:40px 40px;
animation:gridMove 30s linear infinite;
}

body::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:linear-gradient(to bottom,rgba(0,0,0,.35),transparent 20%,transparent 80%,rgba(0,0,0,.35));
}

@keyframes gridMove{
from{transform:translateY(0)}
to{transform:translateY(40px)}
}

#intro{
position:fixed;
inset:0;
background:#120d11;
z-index:9999;
animation:introFade 2.4s ease forwards;
}

.intro-glow{
position:absolute;
inset:0;
background:radial-gradient(circle, rgba(132,83,83,.6), transparent 60%);
animation:introZoom 2.4s ease forwards;
}

@keyframes introFade{
0%,70%{opacity:1}
100%{opacity:0;visibility:hidden}
}

@keyframes introZoom{
from{transform:scale(.6);filter:blur(30px)}
to{transform:scale(2);filter:blur(120px)}
}

#particles{
position:fixed;
inset:0;
width:100%;
height:100%;
pointer-events:none;
}

.container{
position:relative;
z-index:10;
text-align:center;
width:min(92%,900px);
padding:20px;
}

.logo{
width:clamp(120px,20vw,220px);
height:auto;
display:block;
margin:auto;
filter:drop-shadow(0 10px 25px rgba(0,0,0,.3));
animation:logoFloat 5s ease-in-out infinite;
user-select:none;
-webkit-user-drag:none;
}

@keyframes logoFloat{
50%{transform:translateY(-12px)}
}

.error-code{
font-size:clamp(6rem,20vw,15rem);
font-weight:900;
line-height:1;
background:linear-gradient(90deg,#fff,#d7b5b5,#845353,#fff);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 8s linear infinite,float404 5s ease-in-out infinite;
}

@keyframes gradientMove{
to{background-position:300% center}
}

@keyframes float404{
50%{transform:translateY(-12px)}
}

.title{
font-size:clamp(2rem,5vw,3rem);
margin-top:10px;
}

.subtitle{
margin-top:15px;
opacity:.8;
font-size:clamp(1rem,2vw,1.2rem);
}

.home-btn{
display:inline-block;
margin-top:30px;
padding:16px 34px;
border-radius:999px;
text-decoration:none;
color:white;
font-weight:700;
background:linear-gradient(135deg,#553445,#845353);
transition:.4s;
}

.home-btn:hover{
transform:translateY(-4px) scale(1.03);
}

@media(max-width:768px){
.home-btn{width:100%}
}
</style>
</head>
<body>

<div id="intro"><div class="intro-glow"></div></div>
<canvas id="particles"></canvas>

<div class="container">
<img src="YOUR_LOGO.png" alt="Logo" class="logo">

<div class="error-code">404</div>

<h1 class="title">Page Not Found</h1>

<p class="subtitle" id="randomText"></p>

<a href="/" class="home-btn">Return Home</a>
</div>

<script>
const messages=[
"This page wandered too far from spawn.",
"Looks like this chunk hasn't loaded yet.",
"The page you're looking for fell into the void.",
"Error 404: Chunk not found.",
"This portal leads nowhere."
];

document.getElementById("randomText").textContent=messages[Math.floor(Math.random()*messages.length)];

document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("dragstart",e=>e.preventDefault());
document.addEventListener("selectstart",e=>e.preventDefault());

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const particles=[];
for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speed:Math.random()*0.4+0.1,
alpha:Math.random()*0.5+0.2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.y-=p.speed;
if(p.y<-10){p.y=canvas.height+10;p.x=Math.random()*canvas.width;}
ctx.beginPath();
ctx.fillStyle=`rgba(255,255,255,${p.alpha})`;
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
