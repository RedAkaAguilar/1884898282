<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZyrAkaWorld</title>

<link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&display=swap" rel="stylesheet">

<style>

body{

margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;

font-family:"Darumadrop One", cursive;

overflow:hidden;

/* background gradient */

background:linear-gradient(
135deg,
#8bc4cd,
#79c9c3
);

/* blur like your design */

filter:blur(2px);

}

/* LOADER */

.loader{

position:relative;
display:flex;
align-items:center;
justify-content:center;

}

/* CIRCLE */

.ring{

position:absolute;

width:420px;
height:420px;

opacity:0.35;

animation:spin 8s linear infinite;

}

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

/* TEXT */

.loading-text{

font-size:120px;

color:#d7ffff;

/* cartoon border */

-webkit-text-stroke:10px #5a8f95;

/* bottom shadow */

text-shadow:
0px 12px 0px #4e858c;

letter-spacing:3px;

}

</style>

</head>

<body>

<div class="loader">

<svg class="ring" viewBox="0 0 200 200">

<!-- outer ring -->

<circle
cx="100"
cy="100"
r="80"
fill="none"
stroke="#eaffff"
stroke-width="10"
stroke-dasharray="30 25"
stroke-linecap="round"
/>

<!-- inner ring -->

<circle
cx="100"
cy="100"
r="55"
fill="none"
stroke="#eaffff"
stroke-width="8"
stroke-dasharray="18 20"
stroke-linecap="round"
/>

</svg>

<div class="loading-text">
Cargando...
</div>

</div>

</body>
</html>
