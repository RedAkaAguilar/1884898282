<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZyrAkaWorld</title>

<link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;

font-family:'Darumadrop One', cursive;

/* Animated gradient background */

background:linear-gradient(
130deg,
#7fc8c9,
#6fb7c7,
#89d2c6
);

background-size:400% 400%;

animation:bgMove 10s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* CENTER */

.loader{

position:relative;
display:flex;
align-items:center;
justify-content:center;

}

/* RING */

.ring{

position:absolute;

width:320px;
height:320px;

border-radius:50%;

border:12px dashed rgba(255,255,255,0.8);

animation:spin 6s linear infinite;

}

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

/* ENERGY WAVE */

.wave{

position:absolute;

width:500px;
height:200px;

border-radius:50%;

border:4px solid rgba(255,255,255,0.3);

animation:wave 3s ease-out infinite;

}

@keyframes wave{

0%{
transform:scale(0.7);
opacity:0.8;
}

100%{
transform:scale(1.4);
opacity:0;
}

}

/* TEXT */

.loading{

font-size:80px;

color:#bdf4f4;

-webkit-text-stroke:8px #3b8e91;

text-shadow:
0px 10px 0px #317e82;

z-index:10;

animation:textBounce 2s ease-in-out infinite;

}

@keyframes textBounce{

0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}

}

/* PARTICLES */

.particle{

position:absolute;

width:6px;
height:6px;

background:white;

border-radius:50%;

opacity:0.6;

animation:float 6s linear infinite;

}

@keyframes float{

0%{
transform:translateY(200px);
opacity:0;
}

50%{
opacity:0.7;
}

100%{
transform:translateY(-200px);
opacity:0;
}

}

</style>

</head>

<body>

<div class="loader">

<div class="ring"></div>

<div class="wave"></div>

<div class="loading">Cargando...</div>

<!-- particles -->

<div class="particle" style="left:10%; animation-delay:0s;"></div>
<div class="particle" style="left:25%; animation-delay:1s;"></div>
<div class="particle" style="left:40%; animation-delay:2s;"></div>
<div class="particle" style="left:60%; animation-delay:3s;"></div>
<div class="particle" style="left:75%; animation-delay:4s;"></div>
<div class="particle" style="left:90%; animation-delay:5s;"></div>

</div>

</body>
</html>
