<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZyrAkaWorld</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#111;
font-family:"Darumadrop One", sans-serif;
overflow:hidden;
}

/* LOADING SCREEN */

#loader{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
backdrop-filter:blur(40px);
background:linear-gradient(
270deg,
#ff2b2b,
#7a00ff,
#0066ff
);
background-size:600% 600%;
animation:bgmove 6s infinite linear;
}

/* Animated gradient */

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Loading Text */

.loading-text{

font-size:70px;
color:white;

-webkit-text-stroke:20px transparent;

background:linear-gradient(
90deg,
#7a00ff,
#ff6a6a
);

-webkit-background-clip:text;

text-shadow:0px 3px 0px rgba(0,0,0,1);

}

/* MAIN SITE */

#site{
display:none;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:40px;
}

</style>
</head>


<body>


<!-- LOADING SCREEN -->

<div id="loader">
<div class="loading-text">Cargando...</div>
</div>


<!-- MAIN WEBSITE -->

<div id="site">
Bienvenido a ZyrAkaWorld 🌎
</div>


<script>

let loadTime = Math.floor(Math.random() * 4000) + 1000; 
// entre 1 y 5 segundos

setTimeout(() => {

document.getElementById("loader").style.display="none";
document.getElementById("site").style.display="flex";

}, loadTime);

</script>

</body>
</html>
