<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZyrAkaWorld</title>

<link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
font-family:"Darumadrop One", cursive;

/* Gradient like your image */

background:linear-gradient(
135deg,
#8bbfd1,
#8ddbd1
);
}

/* LOADER CONTAINER */

.loader{

position:relative;
display:flex;
align-items:center;
justify-content:center;

}

/* CIRCLE ANIMATION */

.ring{

position:absolute;
width:280px;
height:280px;

animation:spin 6s linear infinite;

opacity:0.45;

}

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

/* TEXT */

.loading-text{

font-size:64px;
color:#cfeeee;

/* outline */

-webkit-text-stroke:8px #5e9aa1;

/* shadow like your design */

text-shadow:
0px 6px 0px #4c8b92;

letter-spacing:2px;

}

</style>
</head>

<body>

<div class="loader">

<!-- SVG RING -->

<svg class="ring" viewBox="0 0 200 200">

<circle 
cx="100"
cy="100"
r="70"
fill="none"
stroke="#e8ffff"
stroke-width="8"
stroke-dasharray="20 20"
stroke-linecap="round"
/>

<circle 
cx="100"
cy="100"
r="50"
fill="none"
stroke="#e8ffff"
stroke-width="6"
stroke-dasharray="10 16"
stroke-linecap="round"
/>

</svg>

<div class="loading-text">
Cargando...
</div>

</div>

</body>
</html>
